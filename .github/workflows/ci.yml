name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-safe-checks:
    name: Public-safe checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: "1"
      NO_COLOR: "1"
      WRANGLER_SEND_METRICS: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository checks
        run: npm run check

      - name: Run synthetic local deploy preflight
        run: npm run local:deploy-synthetic

      - name: Run synthetic stress preflight
        run: npm run stress:local

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate Terraform templates
        run: |
          npm run infra:fmt
          npm run infra:validate

      - name: Run Wrangler dry-run smoke
        run: npm run cloudflare:wrangler-smoke
